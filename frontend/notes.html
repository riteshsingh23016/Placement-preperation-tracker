<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placement Tracker — Notes</title>
    <meta name="description" content="Notes — Placement Preparation & Interview Tracker" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/notes.css" />
  </head>
  <body class="theme-dark" data-page="notes">
    <div class="appShell">
      <aside class="sidebar" aria-label="Sidebar">
        <div class="sidebar__top">
          <a class="logo" href="dashboard.html" aria-label="Placement Tracker home">
            <span class="logo__mark" aria-hidden="true"><i data-lucide="sparkles"></i></span>
            <span class="logo__text">
              <span class="logo__title">Placement Tracker</span>
              <span class="logo__subtitle">Interview & Prep</span>
            </span>
          </a>

          <button class="sidebar__collapse iconBtn" type="button" id="sidebarToggle" aria-label="Toggle sidebar">
            <i data-lucide="panel-left"></i>
          </button>
        </div>

        <nav class="nav">
          <a class="nav__item" href="dashboard.html">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
          </a>
          <a class="nav__item" href="company.html">
            <i data-lucide="building-2"></i>
            <span>Companies</span>
          </a>
          <a class="nav__item is-active" href="notes.html">
            <i data-lucide="notebook-tabs"></i>
            <span>Notes</span>
          </a>

          <div class="nav__divider"></div>

          <a class="nav__item" href="index.html">
            <i data-lucide="log-out"></i>
            <span>Logout</span>
          </a>
        </nav>

        <div class="sidebar__bottom glass">
          <div class="miniProfile">
            <div class="avatar" aria-hidden="true">AS</div>
            <div class="miniProfile__meta">
              <div class="miniProfile__name">Aspirant</div>
              <div class="miniProfile__hint">Demo workspace</div>
            </div>
          </div>
          <button class="btn btn--ghost btn--sm" type="button" id="openCommand">
            <i data-lucide="command"></i>
            <span>Quick commands</span>
          </button>
        </div>
      </aside>

      <div class="content">
        <header class="topbar">
          <div class="topbar__left">
            <button class="iconBtn topbar__menuBtn" type="button" id="mobileMenu" aria-label="Open menu">
              <i data-lucide="menu"></i>
            </button>
            <div class="pageTitle">
              <div class="pageTitle__kicker">Notes</div>
              <div class="pageTitle__title">Interview & Prep</div>
            </div>
          </div>

          <div class="topbar__right">
            <div class="search">
              <i data-lucide="search"></i>
              <input class="search__input" type="search" placeholder="Search notes…" />
            </div>
            <button class="btn btn--primary btn--sm" type="button" id="newNoteBtn">
              <i data-lucide="plus"></i>
              <span>New note</span>
            </button>
          </div>
        </header>

        <main class="main">
          <section class="grid grid--notes">
            <article class="card glass">
              <div class="card__header">
                <div>
                  <div class="card__title">Collections</div>
                  <div class="card__subtitle">Organize by company/round</div>
                </div>
              </div>

              <div class="collections">
                <button class="collection is-active" type="button">
                  <i data-lucide="sparkles"></i>
                  <span>All Notes</span>
                  <span class="badge badge--muted">18</span>
                </button>
                <button class="collection" type="button">
                  <i data-lucide="building-2"></i>
                  <span>Company-wise</span>
                </button>
                <button class="collection" type="button">
                  <i data-lucide="code-2"></i>
                  <span>DSA</span>
                </button>
                <button class="collection" type="button">
                  <i data-lucide="database"></i>
                  <span>DBMS</span>
                </button>
                <button class="collection" type="button">
                  <i data-lucide="globe"></i>
                  <span>OS + CN</span>
                </button>
              </div>
            </article>

            <article class="card glass">
              <div class="card__header">
                <div>
                  <div class="card__title">Recent Notes</div>
                  <div class="card__subtitle">Clean editor-style layout (UI only)</div>
                </div>
                <button class="btn btn--ghost btn--sm" type="button" id="pinNote">
                  <i data-lucide="pin"></i>
                  <span>Pin</span>
                </button>
              </div>

              <div class="noteGrid">
                <button class="noteCard glassHover" type="button">
                  <div class="noteCard__top">
                    <span class="badge badge--good">Interview</span>
                    <span class="noteCard__time">Today</span>
                  </div>
                  <div class="noteCard__title">Neon — Round 1 (Backend)</div>
                  <div class="noteCard__excerpt">
                    Focused on API design, caching tradeoffs, DB indexing. Review: TTL, hot keys,
                    idempotency.
                  </div>
                </button>

                <button class="noteCard glassHover" type="button">
                  <div class="noteCard__top">
                    <span class="badge">Applied</span>
                    <span class="noteCard__time">Yesterday</span>
                  </div>
                  <div class="noteCard__title">Acme Labs — Company research</div>
                  <div class="noteCard__excerpt">
                    Read about product, hiring bar, typical rounds, and tech stack. Prepare STAR
                    stories.
                  </div>
                </button>

                <button class="noteCard glassHover" type="button">
                  <div class="noteCard__top">
                    <span class="badge badge--muted">Prep</span>
                    <span class="noteCard__time">3 days ago</span>
                  </div>
                  <div class="noteCard__title">DBMS — Normal forms cheatsheet</div>
                  <div class="noteCard__excerpt">
                    1NF/2NF/3NF/BCNF quick checks, decomposition tips, and common pitfalls to avoid.
                  </div>
                </button>
              </div>
            </article>
          </section>
        </main>
      </div>
    </div>

    <div class="cmdkOverlay" id="cmdkOverlay" hidden>
      <div class="cmdk glass" role="dialog" aria-modal="true" aria-label="Quick commands">
        <div class="cmdk__top">
          <i data-lucide="command"></i>
          <input class="cmdk__input" id="cmdkInput" placeholder="Type a command…" />
          <button class="iconBtn" type="button" id="cmdkClose" aria-label="Close">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="cmdk__list">
          <button class="cmdk__item" type="button" data-go="dashboard.html">
            <span class="cmdk__label">Go to Dashboard</span>
            <span class="cmdk__hint">Overview & analytics</span>
          </button>
          <button class="cmdk__item" type="button" data-go="company.html">
            <span class="cmdk__label">Go to Companies</span>
            <span class="cmdk__hint">View your applications</span>
          </button>
          <button class="cmdk__item" type="button" data-go="index.html">
            <span class="cmdk__label">Logout</span>
            <span class="cmdk__hint">Back to login</span>
          </button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/app.js" defer></script>
    <script src="js/notes.js" defer></script>
  </body>
</html>
