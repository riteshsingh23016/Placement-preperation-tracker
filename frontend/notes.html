<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placement Tracker — Notes</title>
    <meta name="description" content="Notes — Placement Preparation & Interview Tracker" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/notes.css" />
    <link rel="stylesheet" href="css/notifications.css" />
  </head>
  <body class="theme-dark" data-page="notes">
    <div class="appShell">
      <aside class="sidebar" aria-label="Sidebar">
        <div class="sidebar__top" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
          <a class="logo" href="dashboard.html" aria-label="Placement Tracker home">
            <span class="logo__mark" aria-hidden="true"><i data-lucide="sparkles"></i></span>
            <span class="logo__text">
              <span class="logo__title">Placement Tracker</span>
              <span class="logo__subtitle">Interview & Prep</span>
            </span>
          </a>
          <button class="iconBtn mobile-close-sidebar" type="button" id="closeSidebar" aria-label="Close menu" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
          </button>
        </div>

        <nav class="nav">
          <a class="nav__item" href="dashboard.html">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
          </a>
          <a class="nav__item" href="company.html">
            <i data-lucide="building-2"></i>
            <span>Companies</span>
          </a>
          <a class="nav__item is-active" href="notes.html">
            <i data-lucide="notebook-tabs"></i>
            <span>Notes</span>
          </a>
        </nav>
      </aside>

      <div class="content">
        <header class="topbar">
          <button class="iconBtn topbar__menuBtn" type="button" id="mobileMenu" aria-label="Open menu">
            <i data-lucide="menu"></i>
          </button>
          <div class="pageTitle">
            <div class="pageTitle__kicker">Notes</div>
            <div class="pageTitle__title">Interview & Prep</div>
          </div>

          <div class="topbar__right">
            <div class="search">
              <i data-lucide="search"></i>
              <input class="search__input" type="search" placeholder="Search notes…" id="noteSearch" />
            </div>
            <button class="btn btn--primary btn--sm" type="button" id="newNoteBtn">
              <i data-lucide="plus"></i>
              <span>New note</span>
            </button>
            
            <div class="topbar__actions">
              <div style="position: relative;">
                <button class="iconBtn" type="button" id="ncToggle" aria-label="Notifications">
                  <i data-lucide="bell"></i>
                  <span class="badge-count" id="notifBadge" hidden>0</span>
                </button>

                <!-- Notification Center Panel -->
                <div class="nc-panel" id="ncPanel">
                  <div class="nc-header">
                    <div class="nc-header__title">Notifications</div>
                    <button class="btn btn--ghost btn--sm" id="markAllRead">Mark all read</button>
                  </div>
                  <div class="nc-list" id="ncList">
                    <div class="empty-state">
                      <i data-lucide="bell-off"></i>
                      <div class="empty-state__title">All caught up!</div>
                      <div class="empty-state__text">No new notifications at the moment.</div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="pill" aria-label="Profile">
                <span class="online-dot"></span>
                <span class="pill__text" id="userNameDisplay">User</span>
              </div>
            </div>
          </div>
        </header>

        <main class="main">
          <section class="grid grid--notes">
            <article class="card glass">
              <div class="card__header" style="flex-direction: column; align-items: stretch; gap: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                  <div>
                    <div class="card__title">Collections</div>
                    <div class="card__subtitle">Organize by company/round</div>
                  </div>
                  <button class="iconBtn" type="button" id="newCollectionBtn" data-tooltip="Create Collection" aria-label="Create Collection">
                    <i data-lucide="folder-plus"></i>
                  </button>
                </div>
              </div>

              <div class="collections" id="collectionsContainer">
                <!-- Dynamically populated -->
              </div>
            </article>

            <article class="card glass">
              <div class="card__header">
                <div>
                  <div class="card__title">Recent Notes</div>
                </div>
              </div>

              <div class="noteGrid" id="notesContainer">
              </div>
            </article>
          </section>
        </main>
      </div>
    </div>

    <!-- Note Modal -->
    <div class="modalOverlay" id="noteModal" hidden>
      <div class="modal glass" role="dialog" aria-modal="true" aria-labelledby="noteModalTitle">
        <div class="modal__header">
          <div>
            <h2 class="modal__title" id="noteModalTitle">Add Note</h2>
            <p class="modal__subtitle" id="noteModalSubtitle">Save important details.</p>
          </div>
          <button class="iconBtn modal__close" id="noteModalClose" type="button" aria-label="Close">
            <i data-lucide="x"></i>
          </button>
        </div>

        <div class="modal__body">
          <form class="modalForm" id="noteForm" novalidate>
            <input type="hidden" id="noteEditId" />

            <div class="modalForm__grid">
              <label class="modalField">
                <span class="modalField__label">Title <span class="req">*</span></span>
                <input class="modalField__input" type="text" id="noteTitle" required />
                <span class="modalField__error" id="errNoteTitle" style="color: var(--color-danger); font-size: 11px; margin-top: 4px; display: block;"></span>
              </label>

              <label class="modalField">
                <span class="modalField__label">Collection</span>
                <select class="modalField__input" id="noteCollectionId">
                </select>
              </label>
            </div>

            <label class="modalField">
              <span class="modalField__label">Content <span class="req">*</span></span>
              <textarea class="modalField__input" id="noteContent" rows="6" required></textarea>
              <span class="modalField__error" id="errNoteContent" style="color: var(--color-danger); font-size: 11px; margin-top: 4px; display: block;"></span>
            </label>
          </form>
        </div>

        <div class="modal__footer">
          <button class="btn btn--secondary" id="noteModalCancel" type="button">
            Cancel
          </button>
          <button class="btn btn--primary" type="submit" form="noteForm" id="noteSaveBtn">
            Save Note
          </button>
        </div>
      </div>
    </div>

    <!-- Collection Modal -->
    <div class="modalOverlay" id="collectionModal" hidden>
      <div class="modal modal--sm glass" role="dialog" aria-modal="true" aria-labelledby="collectionModalTitle">
        <div class="modal__header">
          <div>
            <h2 class="modal__title" id="collectionModalTitle">Add Collection</h2>
            <p class="modal__subtitle">Group your notes efficiently.</p>
          </div>
          <button class="iconBtn modal__close" id="collectionModalClose" type="button" aria-label="Close">
            <i data-lucide="x"></i>
          </button>
        </div>

        <div class="modal__body">
          <form class="modalForm" id="collectionForm" novalidate>
            <input type="hidden" id="collectionEditId" />

            <div class="modalField" style="margin-bottom: 12px;">
              <span class="modalField__label">Name <span class="req">*</span></span>
              <input class="modalField__input" type="text" id="collectionName" placeholder="e.g. System Design" required />
              <span class="modalField__error" id="errCollectionName" style="color: var(--color-danger); font-size: 11px; margin-top: 4px; display: block;"></span>
            </div>

            <div class="modalForm__grid">
              <label class="modalField">
                <span class="modalField__label">Color</span>
                <select class="modalField__input" id="collectionColor">
                  <option value="muted">Gray</option>
                  <option value="good">Green</option>
                  <option value="blue">Blue</option>
                  <option value="purple">Purple</option>
                  <option value="amber">Yellow</option>
                  <option value="bad">Red</option>
                </select>
              </label>
              <label class="modalField">
                <span class="modalField__label">Icon</span>
                <select class="modalField__input" id="collectionIcon">
                  <option value="folder">Folder</option>
                  <option value="code-2">Code</option>
                  <option value="database">Database</option>
                  <option value="globe">Network</option>
                  <option value="building-2">Company</option>
                  <option value="briefcase">Briefcase</option>
                  <option value="sparkles">Sparkles</option>
                  <option value="book">Book</option>
                </select>
              </label>
            </div>
          </form>
        </div>

        <div class="modal__footer">
          <button class="btn btn--secondary" id="collectionModalCancel" type="button">
            Cancel
          </button>
          <button class="btn btn--primary" type="submit" form="collectionForm" id="collectionSaveBtn">
            Save Collection
          </button>
        </div>
      </div>
    </div>

    <div class="cmdkOverlay" id="cmdkOverlay" hidden>
      <div class="cmdk glass" role="dialog" aria-modal="true" aria-label="Quick commands">
        <div class="cmdk__top">
          <i data-lucide="command"></i>
          <input class="cmdk__input" id="cmdkInput" placeholder="Type a command…" />
          <button class="iconBtn" type="button" id="cmdkClose" aria-label="Close">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="cmdk__list">
          <button class="cmdk__item" type="button" data-go="dashboard.html">
            <span class="cmdk__label">Go to Dashboard</span>
            <span class="cmdk__hint">Overview & analytics</span>
          </button>
          <button class="cmdk__item" type="button" data-go="company.html">
            <span class="cmdk__label">Go to Companies</span>
            <span class="cmdk__hint">View your applications</span>
          </button>
          <button class="cmdk__item" type="button" data-go="index.html">
            <span class="cmdk__label">Logout</span>
            <span class="cmdk__hint">Back to login</span>
          </button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/config.js" defer></script>
    <script src="js/companyApi.js" defer></script>
    <script src="js/notificationApi.js" defer></script>
    <script src="js/notesApi.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/validators.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/notifications.js" defer></script>
    <script src="js/notes.js" defer></script>
  </body>
</html>
